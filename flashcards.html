<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards | NursePrep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/flashcards.css">
</head>
<body class="dash-body">

<aside class="dash-sidebar">
  <div class="brand">
    <svg width="24" height="24" viewBox="0 0 26 26" fill="none">
      <circle cx="13" cy="13" r="12" stroke="#EC6FA0" stroke-width="1.4"/>
      <path d="M4 13H8L10.5 6L14 20L16 13H22" stroke="#EC6FA0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    NursePrep
  </div>

  <nav class="dash-nav">
    <a href="dashboard.html">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11L12 4L21 11" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10V20H19V10" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Dashboard
    </a>
    <a href="subjects.html">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5C4 5 8 3 12 5C16 3 20 5 20 5V18C20 18 16 16 12 18C8 16 4 18 4 18V5Z" stroke-linejoin="round"/></svg>
      Subjects
    </a>
    <a href="quiz.html">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 10H16M8 14H13" stroke-linecap="round"/></svg>
      Quiz
    </a>
    <a href="flashcards.html" class="active">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="5" width="12" height="16" rx="2"/><rect x="8" y="3" width="12" height="16" rx="2" fill="#0D1220"/></svg>
      Flashcards
    </a>
    <a href="profile.html">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.4"/><path d="M5 20C5 16 8 14 12 14C16 14 19 16 19 20" stroke-linecap="round"/></svg>
      Profile
    </a>
  </nav>

   <div class="dash-sidebar-bottom">
    <div class="dash-sidebar-foot">
      <span class="eyebrow">Streak</span> 
      <p></p><strong id="sidebarStreak">0 days</strong> — keep it going 🔥</p>
    </div>
</aside>

<main class="dash-main dash-main-center">
  <div class="flash-shell" id="flashShell">

    <!-- Toolbar: subject picker, shuffle, favorite, saved view -->
    <div class="flash-toolbar">
      <div class="subject-picker">
        <span class="eyebrow">Subject</span>
        <select id="subjectSelect">
          <option value="fundamentals">Fundamentals of Nursing</option>
          <option value="medSurg">Medical-Surgical Nursing</option>
          <option value="maternal">Maternal Nursing</option>
          <option value="pediatric">Pediatric Nursing</option>
          <option value="psychiatric">Psychiatric Nursing</option>
          <option value="community">Community Health Nursing</option>
          <option value="pharma">Pharmacology</option>
          <option value="leadership">Leadership & Management</option>
        </select>
        <button class="icon-btn" id="favSubjectBtn" title="Favorite this subject" aria-label="Favorite this subject">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3L14.6 9.2L21.5 9.9L16.3 14.4L17.8 21.2L12 17.6L6.2 21.2L7.7 14.4L2.5 9.9L9.4 9.2L12 3Z" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="flash-toolbar-right">
        <label class="shuffle-toggle">
          <input type="checkbox" id="shuffleToggle">
          <span class="shuffle-track"><span class="shuffle-thumb"></span></span>
          <span class="shuffle-label">Shuffle</span>
        </label>
        <button class="btn btn-secondary" id="savedToggleBtn">☆ Saved (<span id="savedCount">0</span>)</button>
      </div>
    </div>

    <!-- Progress: ring + fraction + mastery -->
    <div class="flash-progress-row">
      <div class="progress-ring-wrap">
        <svg class="progress-ring" viewBox="0 0 44 44">
          <circle class="ring-track" cx="22" cy="22" r="18"></circle>
          <circle class="ring-fill" id="ringFill" cx="22" cy="22" r="18"></circle>
        </svg>
        <span class="ring-pct" id="ringPct">0%</span>
      </div>
      <div class="flash-progress-meta">
        <span class="quiz-count" id="flashCounter">01 / 05</span>
        <span class="mastery-count" id="masteryCount">0 / 5 mastered</span>
      </div>
    </div>

    <!-- Card -->
    <div class="flash-card" id="flashCard">
      <div class="flash-inner">
        <div class="flash-front" id="flashFront">
          <div class="flash-card-top">
            <span class="difficulty-badge" id="difficultyBadgeFront"></span>
            <div class="flash-card-icons">
              <button class="icon-btn" id="audioBtnFront" title="Read aloud" aria-label="Read question aloud">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 9V15H8L13 20V4L8 9H4Z" stroke-linejoin="round"/><path d="M16.5 9C17.5 10 17.5 14 16.5 15" stroke-linecap="round"/></svg>
              </button>
              <button class="icon-btn bookmark-btn" id="bookmarkBtnFront" title="Bookmark this card" aria-label="Bookmark this card">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3H18V21L12 17L6 21V3Z" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
          <span class="flash-side-label">Question</span>
          <div class="flash-text">Loading…</div>
          <span class="flash-hint">Tap card to flip · Space/F</span>
        </div>

        <div class="flash-back" id="flashBack">
          <div class="flash-card-top">
            <span class="flash-side-label">Answer</span>
            <div class="flash-card-icons">
              <button class="icon-btn" id="audioBtnBack" title="Read aloud" aria-label="Read answer aloud">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 9V15H8L13 20V4L8 9H4Z" stroke-linejoin="round"/><path d="M16.5 9C17.5 10 17.5 14 16.5 15" stroke-linecap="round"/></svg>
              </button>
              <button class="icon-btn bookmark-btn" id="bookmarkBtnBack" title="Bookmark this card" aria-label="Bookmark this card">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3H18V21L12 17L6 21V3Z" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
          <div class="flash-text"></div>
          <div class="flash-explanation" id="flashExplanation">
            <span class="eyebrow">Explanation</span>
            <p id="explanationText"></p>
          </div>
          <span class="flash-hint">Tap card to flip back</span>
        </div>
      </div>
    </div>

    <!-- Basic nav -->
    <div class="flash-actions">
      <button class="btn btn-secondary" id="prevCard" disabled>Previous</button>
      <button class="btn btn-primary" id="flipCard">Reveal Answer</button>
      <button class="btn btn-secondary" id="nextCard">Next</button>
    </div>

    <!-- Learned toggle -->
    <div class="flash-learned-row">
      <button class="btn btn-secondary learned-btn" id="learnedBtn">✓ Mark as Learned</button>
    </div>

    <!-- Confidence rating (shown after flip) -->
    <div class="confidence-panel" id="confidencePanel">
      <p class="confidence-prompt">How well did you know this?</p>
      <div class="confidence-row">
        <button class="confidence-btn" data-rating="again">😖<span>Again</span></button>
        <button class="confidence-btn" data-rating="hard">😐<span>Hard</span></button>
        <button class="confidence-btn" data-rating="good">🙂<span>Good</span></button>
        <button class="confidence-btn" data-rating="easy">😎<span>Easy</span></button>
      </div>
    </div>

    <p class="keyboard-hint">← Previous &nbsp;·&nbsp; → Next &nbsp;·&nbsp; Space = Reveal &nbsp;·&nbsp; F = Flip</p>

  </div>
</main>

<script type="module" src="./js/flashcards.js"></script>
<script type="module" src="js/sidebar.js"></script> 
</body>
</html>
